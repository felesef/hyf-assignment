<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Currency calculator</h1>
        <p class="sub"> Updates when you change amount or currencies.</p>

        <div class="card">
            <div class="field">
                <label for="amount">Amount</label>
                <input type="number" id="amount" min="0" step="any" value="100" inputmode="decimal">
            </div>

            <div class="field">
                <label for="from-currency">Convert from</label>
                <select id="from-currency" disabled>
                    <option>Loading…</option>
                </select>
            </div>

            <div class="field">
                <label for="to-currency">Convert to</label>
                <select id="to-currency" disabled>
                    <option>Loading…</option>
                </select>
            </div>

            <div class="result-box" id="result-box" hidden>
                <p>Equivalent amount</p>
                <div class="result-value" id="result-value">—</div>
            </div>

            <p class="status" id="status" aria-live="polite"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
