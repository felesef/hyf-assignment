<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts House Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-container" id="backgroundContainer">
        <div class="background-overlay"></div>
    </div>
    
    <div class="house-logo-container" id="houseLogoContainer"></div>
    
    <div class="container">
        <h1>Hogwarts House Generator</h1>
        <div class="input-group">
            <label for="nameInput">Enter your name:</label>
            <input type="text" id="nameInput" placeholder="Type your name here...">
        </div>

        <button id="generateBtn">Get My House!</button>
        <div id="result" class="result"></div>
        <button id="tryAgainBtn" class="hidden">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
